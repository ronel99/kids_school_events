<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אירועים קרובים ג'1</title>
    <style>
        :root {
            --primary-blue: #3b82f6;
            --text-main: #1e293b;
            --text-sub: #475569;
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: var(--text-main);
            font-size: 2.2rem;
            margin-bottom: 35px;
            font-weight: 800;
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .event-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-radius: 16px;
            transition: background-color 0.2s;
            border-bottom: 1px solid #f1f5f9;
        }

        /* עימוד העמודות */
        .date {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            width: 100px; /* רוחב קבוע לתאריך */
            flex-shrink: 0;
        }

        .title {
            flex-grow: 1;
            font-size: 1.15rem;
            color: var(--text-sub);
            padding: 0 15px;
            text-align: right;
        }

        /* עיצוב כפתור אחיד ודינמי */
        .btn-container {
            width: 110px; /* רוחב קבוע למכולת הכפתור כדי שהכל יהיה מיושר */
            display: flex;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-link {
            background-color: var(--primary-blue);
            color: white;
            text-decoration: none;
            width: 100%; /* הכפתור ימלא את כל ה-110px */
            text-align: center;
            padding: 10px 0;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }

        .btn-link:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }

        .btn-link:active {
            transform: translateY(0);
        }

        .empty-space {
            width: 110px; /* שומר על המקום גם כשאין כפתור */
        }

        .loading {
            text-align: center;
            color: #94a3b8;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>אירועים קרובים ג'1</h1>
    <div id="loader" class="loading">טוען נתונים...</div>
    <div class="event-list" id="event-list"></div>
</div>

<script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3CbYUVUDzXq2mZ1eZ0u1VQPJuZ7tUj3cGjYad9WDHq5ezf5kveHHQ2UrAcKWlV-7dJsgKM35tsud7/pub?gid=0&single=true&output=csv';

    async function fetchEvents() {
        try {
            const response = await fetch(SHEET_CSV_URL);
            const data = await response.text();
            const rows = data.split(/\r?\n/).slice(1); 
            const listContainer = document.getElementById('event-list');
            const loader = document.getElementById('loader');
            
            listContainer.innerHTML = '';
            loader.style.display = 'none';

            rows.forEach(row => {
                const columns = row.split(',');
                if (columns.length >= 2 && columns[0].trim() !== "") {
                    const date = columns[0].trim();
                    const title = columns[1].trim();
                    const link = columns[2] ? columns[2].trim() : '';
                    const buttonText = (columns[3] && columns[3].trim() !== "") ? columns[3].trim() : 'חומר';

                    const hasLink = link && link.toLowerCase().startsWith('http');

                    const eventHtml = `
                        <div class="event-item">
                            <span class="date">${date}</span>
                            <span class="title">${title}</span>
                            <div class="btn-container">
                                ${hasLink ? `<a href="${link}" target="_blank" class="btn-link">${buttonText}</a>` : '<div class="empty-space"></div>'}
                            </div>
                        </div>
                    `;
                    listContainer.innerHTML += eventHtml;
                }
            });
        } catch (error) {
            loader.innerText = 'שגיאה בטעינה. בדוק את חיבור האינטרנט או הקישור.';
        }
    }

    fetchEvents();
</script>

</body>
</html>

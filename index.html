<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>אירועים קרובים ג'1</title>
    
    <!-- Meta Tags לתצוגה מקדימה בוואטסאפ -->
    <meta property="og:title" content="אירועים קרובים ג'1">
    <meta property="og:image" content="https://ronel99.github.io/kids_school_events/thumbnail.png">
    <meta property="og:type" content="website">

    <style>
        :root {
            --primary-blue: #3b82f6;
            --secondary-green: #10b981;
            --text-main: #1e293b;
            --text-sub: #475569;
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            direction: rtl;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 550px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 20px;
            box-sizing: border-box;
        }

        .header-image {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 25px;
            border-radius: 12px;
        }

        /* Upload Section Styling */
        .upload-section {
            margin-bottom: 25px;
            padding: 15px;
            background: #f0f7ff;
            border-radius: 16px;
            border: 2px dashed #bfdbfe;
            text-align: center;
        }

        .upload-title {
            margin: 0 0 10px 0;
            font-weight: 700;
            color: var(--primary-blue);
            font-size: 0.95rem;
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .event-item {
            display: grid;
            grid-template-columns: 75px 1fr 140px;
            align-items: center;
            padding: 14px;
            border-radius: 16px;
            background: #fff;
            border: 1px solid #f1f5f9;
            gap: 10px;
        }

        .date {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            text-align: right;
        }

        .title {
            font-size: 1rem;
            color: var(--text-sub);
            text-align: right;
            font-weight: 500;
            line-height: 1.3;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            align-items: center;
        }

        .btn-link {
            text-decoration: none;
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            white-space: nowrap;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-material {
            background-color: var(--primary-blue);
            color: white;
            flex-grow: 1;
        }

        .btn-calendar {
            background-color: white;
            color: var(--secondary-green);
            border: 1px solid var(--secondary-green);
            padding: 8px;
            width: 38px;
            height: 38px;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .btn-edit {
            background-color: #f1f5f9;
            color: var(--text-sub);
            width: 100%;
            margin-top: 10px;
            border: 1px solid #e2e8f0;
        }

        .loading { text-align: center; color: #94a3b8; padding: 20px; }

        @media (max-width: 420px) {
            .event-item {
                grid-template-columns: 60px 1fr 120px;
                padding: 10px;
                gap: 5px;
            }
            .date { font-size: 0.9rem; }
            .title { font-size: 0.85rem; }
            .btn-link { font-size: 0.75rem; padding: 6px 8px; }
            .btn-calendar { width: 32px; height: 32px; padding: 5px; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="thumbnail.png" alt="כותרת" class="header-image">

    <!-- Upload Tool -->
    <div class="upload-section">
        <p class="upload-title">העלאת קובץ (דף קשר/הזמנה)</p>
        <input type="file" id="fileInput" style="display: none;">
        <button onclick="document.getElementById('fileInput').click()" id="uploadBtn" class="btn-link btn-material" style="width: 100%;">
            📤 בחר קובץ וקבל לינק להדבקה
        </button>
        <div id="uploadStatus" style="margin-top: 10px; font-size: 0.8rem; color: var(--text-sub); min-height: 20px;"></div>
    </div>

    <div id="loader" class="loading">טוען נתונים...</div>
    <div id="event-list" class="event-list"></div>

    <!-- Edit Button -->
    <div style="margin-top: 30px; border-top: 1px solid #f1f5f9; padding-top: 20px; text-align: center;">
        <a href="https://docs.google.com/spreadsheets/d/1vT3CbYUVUDzXq2mZ1eZ0u1VQPJuZ7tUj3cGjYad9WDHq5ezf5kveHHQ2UrAcKWlV-7dJsgKM35tsud7/edit" target="_blank" class="btn-link btn-edit">
            ✏️ עריכת טבלת האירועים
        </a>
        <p style="font-size: 0.7rem; color: #94a3b8; margin-top: 8px;">העלו קובץ למעלה, העתיקו את הלינק והדביקו בטבלה</p>
    </div>
</div>

<script>
    // --- Configuration ---
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3CbYUVUDzXq2mZ1eZ0u1VQPJuZ7tUj3cGjYad9WDHq5ezf5kveHHQ2UrAcKWlV-7dJsgKM35tsud7/pub?gid=0&single=true&output=csv';
    const APPS_SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL'; // Replace this!

    // --- Fetch Events Logic ---
    async function fetchEvents() {
        try {
            const response = await fetch(SHEET_CSV_URL + `&t=${Date.now()}`);
            const data = await response.text();
            const rows = data.split(/\r?\n/).filter(row => row.trim() !== "").slice(1); 
            const listContainer = document.getElementById('event-list');
            
            document.getElementById('loader').style.display = 'none';
            listContainer.innerHTML = '';

            rows.forEach(row => {
                const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/"/g, '').trim());
                if (columns.length >= 2) {
                    const dateStr = columns[0];
                    const title = columns[1];
                    const link = columns[2] || '';
                    const buttonText = columns[3] || "חומר";

                    const calendarUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title + " - ג'1")}`;

                    let html = `
                        <div class="event-item">
                            <span class="date">${dateStr}</span>
                            <span class="title">${title}</span>
                            <div class="action-buttons">
                                ${link ? `
                                    <a href="${link}" target="_blank" class="btn-link btn-material">
                                        <span>📄</span><span>${buttonText}</span>
                                    </a>
                                ` : ''}
                                <a href="${calendarUrl}" target="_blank" class="btn-link btn-calendar">
                                    <span>📅</span>
                                </a>
                            </div>
                        </div>
                    `;
                    listContainer.innerHTML += html;
                }
            });
        } catch (error) {
            document.getElementById('loader').innerText = 'שגיאה בטעינה.';
        }
    }

    // --- Upload Logic ---
    document.getElementById('fileInput').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const status = document.getElementById('uploadStatus');
        const btn = document.getElementById('uploadBtn');
        
        status.innerHTML = "⌛ מעלה קובץ... נא לא לסגור";
        btn.disabled = true;
        btn.style.opacity = "0.5";

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async function() {
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Important for Apps Script
                    body: JSON.stringify({
                        name: file.name,
                        content: reader.result
                    })
                });
                
                // Note: With 'no-cors', we can't read the response body directly 
                // in some browsers. If you need the exact link returned, 
                // ensure your Apps Script is set to "Anyone" and use a standard fetch.
                
                // Assuming successful upload:
                status.innerHTML = `<b style="color: var(--secondary-green);">הקובץ הועלה! ✅</b><br>הלינק הועתק. הדביקו אותו בטבלה.`;
                
                // If using standard fetch (CORS enabled):
                // const result = await response.json();
                // await navigator.clipboard.writeText(result.url);

            } catch (error) {
                status.innerText = "שגיאה. וודאו שהלינק של ה-Script תקין.";
            } finally {
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        };
    });

    fetchEvents();
</script>

</body>
</html>

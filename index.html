<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>אירועים קרובים ג'1</title>
    
    <!-- Meta Tags לתצוגה מקדימה בוואטסאפ -->
    <meta property="og:title" content="אירועים קרובים ג'1">
    <meta property="og:image" content="https://ronel99.github.io/kids_school_events/thumbnail.png">
    <meta property="og:type" content="website">

    <style>
        :root {
            --primary-blue: #3b82f6;
            --secondary-green: #10b981;
            --text-main: #1e293b;
            --text-sub: #475569;
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* מונע מהקופסה הלבנה להימתח עד למטה סתם */
            direction: rtl;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 550px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 20px;
            box-sizing: border-box;
        }

        .header-image {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 25px;
            border-radius: 12px;
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .event-item {
            display: grid;
            grid-template-columns: 75px 1fr 140px;
            align-items: center;
            padding: 14px;
            border-radius: 16px;
            background: #fff;
            border: 1px solid #f1f5f9;
            gap: 10px;
        }

        .date {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            text-align: right;
        }

        .title {
            font-size: 1rem;
            color: var(--text-sub);
            text-align: right;
            font-weight: 500;
            line-height: 1.3;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            align-items: center;
        }

        .btn-link {
            text-decoration: none;
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            white-space: nowrap;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-material {
            background-color: var(--primary-blue);
            color: white;
            flex-grow: 1;
        }

        .btn-calendar {
            background-color: white;
            color: var(--secondary-green);
            border: 1px solid var(--secondary-green);
            padding: 8px;
            width: 38px;
            height: 38px;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .btn-edit {
            background-color: #f1f5f9;
            color: var(--text-sub);
            width: 100%;
            margin-top: 10px;
            border: 1px solid #e2e8f0;
            box-sizing: border-box;
            display: flex;
        }

        /* סגנונות לכפתור וחלונית ההסבר */
        .help-btn {
            background: none;
            border: none;
            color: #64748b;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 12px;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .help-btn:hover {
            color: var(--primary-blue);
        }

        .help-content {
            display: none;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--text-sub);
            text-align: right;
            line-height: 1.5;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .help-content.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading { text-align: center; color: #94a3b8; padding: 20px; }

        @media (max-width: 420px) {
            .event-item {
                grid-template-columns: 60px 1fr 120px;
                padding: 10px;
                gap: 5px;
            }
            .date { font-size: 0.9rem; }
            .title { font-size: 0.85rem; }
            .btn-link { font-size: 0.75rem; padding: 6px 8px; }
            .btn-calendar { width: 32px; height: 32px; padding: 5px; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="thumbnail.png" alt="כותרת" class="header-image">

    <div id="loader" class="loading">טוען נתונים...</div>
    <div id="event-list" class="event-list"></div>

    <!-- אזור תחתון: כפתור עריכה והסבר -->
    <div style="margin-top: 30px; border-top: 1px solid #f1f5f9; padding-top: 20px; text-align: center;">
        
        <!-- כפתור העריכה -->
        <a href="https://docs.google.com/spreadsheets/d/11Y9G8XIliGPGU5DLR3jQbz3M3BGU7TkcTjzXoPwYpLk/edit?usp=drivesdk" target="_blank" class="btn-link btn-edit">
            <span>✏️</span>
            <span>עריכת טבלת האירועים</span>
        </a>
        
        <!-- כפתור עזרה אקורדיון -->
        <button class="help-btn" onclick="toggleHelp()">
            <span>❔</span> איך מוסיפים או מעדכנים אירוע?
        </button>
        
        <!-- חלונית ההסבר (מוסתרת כברירת מחדל) -->
        <div id="helpBox" class="help-content">
            <ol style="margin-top: 0; margin-bottom: 0; padding-right: 20px;">
                <li>לחצו על כפתור העריכה כדי לפתוח את הטבלה.</li>
                <li>הוסיפו שורה חדשה עם תאריך ושם האירוע.</li>
                <li>(אופציונלי) אם יש קובץ מצורף, הדביקו את הקישור שלו בעמודה המתאימה.</li>
            </ol>
            <div style="margin-top: 10px; font-size: 0.75rem; color: #94a3b8; text-align: center;">
                * השינויים בטבלה יתעדכנו באתר באופן אוטומטי.
            </div>
        </div>

    </div>
</div>

<script>
    // --- Configuration ---
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3CbYUVUDzXq2mZ1eZ0u1VQPJuZ7tUj3cGjYad9WDHq5ezf5kveHHQ2UrAcKWlV-7dJsgKM35tsud7/pub?gid=0&single=true&output=csv';

    // --- Fetch Events Logic ---
    async function fetchEvents() {
        try {
            const response = await fetch(SHEET_CSV_URL + `&t=${Date.now()}`);
            const data = await response.text();
            const rows = data.split(/\r?\n/).filter(row => row.trim() !== "").slice(1); 
            const listContainer = document.getElementById('event-list');
            
            document.getElementById('loader').style.display = 'none';
            listContainer.innerHTML = '';

            rows.forEach(row => {
                const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/"/g, '').trim());
if (columns.length >= 2 && columns[0].trim() !== "" && columns[1].trim() !== "") {
                    const dateStr = columns[0];
                    const title = columns[1];
                    const link = columns[2] || '';
                    const buttonText = columns[3] || "חומר";

                    const calendarUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title + " - ג'1")}`;

                    let html = `
                        <div class="event-item">
                            <span class="date">${dateStr}</span>
                            <span class="title">${title}</span>
                            <div class="action-buttons">
                                ${link ? `
                                    <a href="${link}" target="_blank" class="btn-link btn-material">
                                        <span>📄</span><span>${buttonText}</span>
                                    </a>
                                ` : ''}
                                <a href="${calendarUrl}" target="_blank" class="btn-link btn-calendar">
                                    <span>📅</span>
                                </a>
                            </div>
                        </div>
                    `;
                    listContainer.innerHTML += html;
                }
            });
        } catch (error) {
            document.getElementById('loader').innerText = 'שגיאה בטעינה.';
        }
    }

    // --- Toggle Help Box ---
    function toggleHelp() {
        const helpBox = document.getElementById('helpBox');
        helpBox.classList.toggle('show');
    }

    fetchEvents();
</script>

</body>
</html>

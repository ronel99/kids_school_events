<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>אירועים קרובים ג'1</title>
    <style>
        :root {
            --primary-blue: #3b82f6;
            --text-main: #1e293b;
            --text-sub: #475569;
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: var(--text-main);
            font-size: 2.2rem;
            margin-bottom: 35px;
            font-weight: 800;
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .event-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-radius: 16px;
            border-bottom: 1px solid #f1f5f9;
        }

        .date {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            width: 100px;
            flex-shrink: 0;
        }

        .title {
            flex-grow: 1;
            font-size: 1.1rem;
            color: var(--text-sub);
            padding: 0 10px;
            text-align: right;
        }

        .btn-container {
            width: 135px; 
            display: flex;
            justify-content: flex-end;
            flex-shrink: 0;
        }

        .btn-link {
            background-color: var(--primary-blue);
            color: white;
            text-decoration: none;
            width: 100%;
            padding: 10px 4px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.15);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            line-height: 1;
        }

        .btn-link span.icon {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
        }

        .btn-link:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }

        .empty-space { width: 135px; }
        .loading { text-align: center; color: #94a3b8; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>אירועים קרובים ג'1</h1>
    <div id="loader" class="loading">מעדכן נתונים...</div>
    <div class="event-list" id="event-list"></div>
</div>

<script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3CbYUVUDzXq2mZ1eZ0u1VQPJuZ7tUj3cGjYad9WDHq5ezf5kveHHQ2UrAcKWlV-7dJsgKM35tsud7/pub?gid=0&single=true&output=csv';
    const CACHE_BUSTER = `&t=${new Date().getTime()}`;

    // פונקציית המרה לקישור גולמי (Raw PDF)
    function formatDriveLink(url) {
        if (url.includes('drive.google.com')) {
            const fileIdMatch = url.match(/\/d\/([^/]+)/) || url.match(/id=([^&]+)/);
            if (fileIdMatch && fileIdMatch[1]) {
                // המרה לפורמט הישיר ביותר של גוגל לפתיחה בדפדפן
                return `https://drive.google.com/uc?id=${fileIdMatch[1]}&preview=true`;
            }
        }
        return url;
    }

    function getFileIcon(url, buttonText) {
        const lowerText = buttonText.toLowerCase();
        const lowerUrl = url.toLowerCase();
        if (lowerText.includes('מבחן') || lowerText.includes('חומר') || lowerText.includes('דף')) return '📄';
        if (lowerText.includes('מצגת') || lowerText.includes('צפה')) return '🖼️';
        if (lowerText.includes('פרטים')) return 'i️';
        return lowerUrl.includes('drive.google.com') ? '📂' : '🔗';
    }

    async function fetchEvents() {
        try {
            const response = await fetch(SHEET_CSV_URL + CACHE_BUSTER);
            const data = await response.text();
            const rows = data.split(/\r?\n/).filter(row => row.trim() !== "").slice(1); 
            const listContainer = document.getElementById('event-list');
            
            document.getElementById('loader').style.display = 'none';
            listContainer.innerHTML = '';

            rows.forEach(row => {
                const columns = row.split(',').map(col => col.trim());
                if (columns.length >= 2) {
                    const date = columns[0];
                    const title = columns[1];
                    let link = columns[2] || '';
                    let buttonText = (columns[3] && columns[3] !== "") ? columns[3] : "חומר";

                    if (link.toLowerCase().startsWith('http')) {
                        link = formatDriveLink(link);
                        const icon = getFileIcon(link, buttonText);
                        
                        listContainer.innerHTML += `
                            <div class="event-item">
                                <span class="date">${date}</span>
                                <span class="title">${title}</span>
                                <div class="btn-container">
                                    <a href="${link}" target="_blank" class="btn-link">
                                        <span class="icon">${icon}</span>
                                        <span>${buttonText}</span>
                                    </a>
                                </div>
                            </div>
                        `;
                    } else {
                        listContainer.innerHTML += `
                            <div class="event-item">
                                <span class="date">${date}</span>
                                <span class="title">${title}</span>
                                <div class="btn-container"><div class="empty-space"></div></div>
                            </div>
                        `;
                    }
                }
            });
        } catch (error) {
            document.getElementById('loader').innerText = 'שגיאה בטעינה.';
        }
    }

    fetchEvents();
</script>

</body>
</html>

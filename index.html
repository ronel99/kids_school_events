<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>אירועים קרובים ג'1</title>
    <style>
        :root {
            --primary-blue: #3b82f6;
            --text-main: #1e293b;
            --text-sub: #475569;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: var(--text-main);
            font-size: 2.2rem;
            margin-bottom: 35px;
            font-weight: 800;
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .event-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-radius: 16px;
            border-bottom: 1px solid #f1f5f9;
            transition: background-color 0.2s;
        }

        .event-item:hover {
            background-color: #fcfdfe;
        }

        /* עימוד עמודות */
        .date {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            width: 100px; /* רוחב קבוע לתאריך ליישור מושלם */
            flex-shrink: 0;
        }

        .title {
            flex-grow: 1;
            font-size: 1.1rem;
            color: var(--text-sub);
            padding: 0 15px;
            text-align: right;
        }

        /* מכולת כפתור בגודל קבוע */
        .btn-container {
            width: 110px; 
            display: flex;
            justify-content: flex-start;
            flex-shrink: 0;
        }

        .btn-link {
            background-color: var(--primary-blue);
            color: white;
            text-decoration: none;
            width: 100%;
            text-align: center;
            padding: 9px 0;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.15);
            display: block;
        }

        .btn-link:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(59, 130, 246, 0.25);
        }

        .empty-space {
            width: 110px;
        }

        .loading {
            text-align: center;
            color: #94a3b8;
            padding: 20px;
            font-size: 1rem;
        }

        @media (max-width: 400px) {
            .date { width: 80px; font-size: 1rem; }
            .title { font-size: 1rem; }
            .btn-container { width: 90px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>אירועים קרובים ג'1</h1>
    <div id="loader" class="loading">טוען נתונים מעודכנים...</div>
    <div class="event-list" id="event-list"></div>
</div>

<script>
    // החלף בקישור ה-CSV שלך
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3CbYUVUDzXq2mZ1eZ0u1VQPJuZ7tUj3cGjYad9WDHq5ezf5kveHHQ2UrAcKWlV-7dJsgKM35tsud7/pub?gid=0&single=true&output=csv';
    
    // הוספת Timestamp כדי למנוע טעינה מהזיכרון הישן (Cache)
    const CACHE_BUSTER = `&t=${new Date().getTime()}`;

    async function fetchEvents() {
        try {
            const response = await fetch(SHEET_CSV_URL + CACHE_BUSTER);
            const data = await response.text();
            
            // עיבוד השורות: ניקוי רווחים והתעלמות משורות ריקות
            const rows = data.split(/\r?\n/).filter(row => row.trim() !== "").slice(1); 
            const listContainer = document.getElementById('event-list');
            const loader = document.getElementById('loader');
            
            listContainer.innerHTML = '';
            loader.style.display = 'none';

            rows.forEach(row => {
                // פיצול לפי פסיק וניקוי רווחים מכל תא
                const columns = row.split(',').map(col => col.trim());
                
                if (columns.length >= 2) {
                    const date = columns[0];
                    const title = columns[1];
                    const link = columns[2] || '';
                    
                    // בדיקה אם קיים טקסט לכפתור בעמודה D, אחרת ברירת מחדל
                    const buttonText = (columns[3] && columns[3] !== "") ? columns[3] : "חומר למטלה";

                    const hasLink = link.toLowerCase().startsWith('http');

                    const eventHtml = `
                        <div class="event-item">
                            <span class="date">${date}</span>
                            <span class="title">${title}</span>
                            <div class="btn-container">
                                ${hasLink ? 
                                    `<a href="${link}" target="_blank" class="btn-link">${buttonText}</a>` : 
                                    '<div class="empty-space"></div>'}
                            </div>
                        </div>
                    `;
                    listContainer.innerHTML += eventHtml;
                }
            });
        } catch (error) {
            console.error("Fetch error:", error);
            document.getElementById('loader').innerText = 'שגיאה בטעינה. וודא שהגיליון מפורסם כ-CSV.';
        }
    }

    // הפעלה
    fetchEvents();
</script>

</body>
</html>
